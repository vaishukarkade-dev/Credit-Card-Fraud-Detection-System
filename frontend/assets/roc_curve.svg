<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Line Gradients -->
    <linearGradient id="rf-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <linearGradient id="xgb-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
    <linearGradient id="lr-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#FBBF24" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-rf" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-xgb" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Animated drawing of ROC lines */
    .line-rf {
      stroke: url(#rf-grad);
      stroke-width: 4.5;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      filter: url(#glow-rf);
    }
    .line-xgb {
      stroke: url(#xgb-grad);
      stroke-width: 3.5;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 2.2s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
      filter: url(#glow-xgb);
    }
    .line-lr {
      stroke: url(#lr-grad);
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 1.8s cubic-bezier(0.25, 1, 0.5, 1) 0.6s forwards;
    }
    .line-diagonal {
      stroke: #374151;
      stroke-width: 2;
      stroke-dasharray: 6 6;
      fill: none;
    }

    /* Pulse animation for endpoint indicators */
    .pulse-dot {
      animation: pulse 2s infinite alternate;
    }

    @keyframes drawLine {
      to {
        stroke-dashoffset: 0;
      }
    }
    @keyframes pulse {
      0% {
        r: 4;
        opacity: 0.7;
      }
      100% {
        r: 8;
        opacity: 1;
        fill: #34D399;
      }
    }

    /* Text & Legend styling */
    .title-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 18px;
      font-weight: 700;
      fill: #F9FAFB;
    }
    .axis-label {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      fill: #9CA3AF;
    }
    .grid-line {
      stroke: #1F2937;
      stroke-width: 1;
    }
    .legend-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      fill: #E5E7EB;
    }
  </style>

  <!-- Background -->
  <rect width="600" height="400" rx="16" fill="url(#bg-grad)" />

  <!-- Graph Title -->
  <text x="30" y="40" class="title-text">ROC-AUC Performance Curves</text>

  <!-- Grids -->
  <!-- Horizontal -->
  <line x1="80" y1="80" x2="520" y2="80" class="grid-line" />
  <line x1="80" y1="140" x2="520" y2="140" class="grid-line" />
  <line x1="80" y1="200" x2="520" y2="200" class="grid-line" />
  <line x1="80" y1="260" x2="520" y2="260" class="grid-line" />
  <line x1="80" y1="320" x2="520" y2="320" class="grid-line" />

  <!-- Vertical -->
  <line x1="80" y1="80" x2="80" y2="320" class="grid-line" />
  <line x1="190" y1="80" x2="190" y2="320" class="grid-line" />
  <line x1="300" y1="80" x2="300" y2="320" class="grid-line" />
  <line x1="410" y1="80" x2="410" y2="320" class="grid-line" />
  <line x1="520" y1="80" x2="520" y2="320" class="grid-line" />

  <!-- Axis Values -->
  <!-- Y-Axis (True Positive Rate) -->
  <text x="50" y="84" class="axis-label" text-anchor="end">1.0</text>
  <text x="50" y="144" class="axis-label" text-anchor="end">0.75</text>
  <text x="50" y="204" class="axis-label" text-anchor="end">0.5</text>
  <text x="50" y="264" class="axis-label" text-anchor="end">0.25</text>
  <text x="50" y="324" class="axis-label" text-anchor="end">0.0</text>

  <!-- X-Axis (False Positive Rate) -->
  <text x="80" y="345" class="axis-label" text-anchor="middle">0.0</text>
  <text x="190" y="345" class="axis-label" text-anchor="middle">0.25</text>
  <text x="300" y="345" class="axis-label" text-anchor="middle">0.5</text>
  <text x="410" y="345" class="axis-label" text-anchor="middle">0.75</text>
  <text x="520" y="345" class="axis-label" text-anchor="middle">1.0</text>

  <!-- Labels -->
  <text x="300" y="375" class="axis-label" text-anchor="middle" font-size="12">False Positive Rate (FPR)</text>
  <text x="25" y="200" class="axis-label" text-anchor="middle" font-size="12" transform="rotate(-90 25 200)">True Positive Rate (TPR)</text>

  <!-- Lines -->
  <!-- Diagonal Baseline (Random Guess) -->
  <path d="M 80,320 L 520,80" class="line-diagonal" />

  <!-- Y = 320 is 0.0, Y = 80 is 1.0. X = 80 is 0.0, X = 520 is 1.0. -->
  <!-- Logistic Regression Line -->
  <path d="M 80,320 C 130,220 200,100 520,80" class="line-lr" />

  <!-- XGBoost Line -->
  <path d="M 80,320 C 100,170 140,86 520,80" class="line-xgb" />

  <!-- Random Forest Line (ROC = 0.9974) -->
  <path d="M 80,320 C 82,100 95,81 520,80" class="line-rf" />

  <!-- Endpoint Pulse Indicator -->
  <circle cx="81.5" cy="115" r="5" fill="#10B981" class="pulse-dot" />

  <!-- Legend -->
  <g transform="translate(380, 240)">
    <!-- Glassmorphism Legend Box Background -->
    <rect width="210" height="110" rx="8" fill="#111827" fill-opacity="0.85" stroke="#1F2937" stroke-width="1.5" />

    <!-- Random Forest -->
    <line x1="15" y1="25" x2="35" y2="25" stroke="#10B981" stroke-width="4.5" />
    <circle cx="25" cy="25" r="3" fill="#FFF" />
    <text x="50" y="29" class="legend-text">Random Forest (0.997)</text>

    <!-- XGBoost -->
    <line x1="15" y1="52" x2="35" y2="52" stroke="#3B82F6" stroke-width="3.5" />
    <circle cx="25" cy="52" r="3" fill="#FFF" />
    <text x="50" y="56" class="legend-text">XGBoost (0.987)</text>

    <!-- Logistic Regression -->
    <line x1="15" y1="79" x2="35" y2="79" stroke="#F59E0B" stroke-width="2.5" />
    <circle cx="25" cy="79" r="3" fill="#FFF" />
    <text x="50" y="83" class="legend-text">Logistic Regression (0.970)</text>
  </g>
</svg>
