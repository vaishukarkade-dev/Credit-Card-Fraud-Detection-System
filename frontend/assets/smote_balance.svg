<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Bar Gradients -->
    <linearGradient id="legit-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <linearGradient id="fraud-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#F87171" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .title {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 700;
      fill: #F9FAFB;
    }
    .axis {
      stroke: #374151;
      stroke-width: 1.5;
    }
    .label {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: #9CA3AF;
    }
    .bar-label {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 700;
      opacity: 0;
      animation: fadeInText 0.5s ease-out 1.8s forwards;
    }

    /* Bar Grow Animations */
    .bar-before-legit {
      fill: url(#legit-grad);
      animation: growBarLegitBefore 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    .bar-before-fraud {
      fill: url(#fraud-grad);
      animation: growBarFraudBefore 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      filter: url(#glow-red);
    }
    .bar-after-legit {
      fill: url(#legit-grad);
      animation: growBarLegitAfter 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
    }
    .bar-after-fraud {
      fill: url(#fraud-grad);
      animation: growBarFraudAfter 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
      filter: url(#glow-red);
    }

    @keyframes growBarLegitBefore {
      from { height: 0; y: 190; }
      to { height: 140px; y: 50; }
    }
    @keyframes growBarFraudBefore {
      from { height: 0; y: 190; }
      to { height: 2px; y: 188; } /* Almost microscopic fraud bar */
    }
    @keyframes growBarLegitAfter {
      from { height: 0; y: 190; }
      to { height: 140px; y: 50; }
    }
    @keyframes growBarFraudAfter {
      from { height: 0; y: 190; }
      to { height: 42px; y: 148; } /* Synthetically oversampled to 1:10 ratio */
    }
    @keyframes fadeInText {
      to { opacity: 1; }
    }
  </style>

  <!-- Background -->
  <rect width="500" height="250" rx="12" fill="url(#bg-grad)" />

  <!-- Title -->
  <text x="25" y="35" class="title">SMOTE Resampling: Addressing Class Imbalance</text>

  <!-- Chart 1: Before SMOTE -->
  <g transform="translate(10, 10)">
    <!-- Base Axis -->
    <line x1="40" y1="190" x2="200" y2="190" class="axis" />
    <line x1="40" y1="50" x2="40" y2="190" class="axis" />

    <!-- Legit Bar -->
    <rect x="60" y="190" width="35" height="0" rx="4" class="bar-before-legit" />
    <!-- Fraud Bar -->
    <rect x="125" y="190" width="35" height="0" rx="4" class="bar-before-fraud" />

    <!-- Labels -->
    <text x="77" y="206" class="label" text-anchor="middle">Legit</text>
    <text x="142" y="206" class="label" text-anchor="middle">Fraud</text>
    <text x="120" y="228" class="label" text-anchor="middle" font-size="10" font-weight="bold">Before SMOTE (0.17% Fraud)</text>

    <!-- Microscopic Text marker -->
    <text x="142" y="180" class="bar-label" fill="#F87171" text-anchor="middle" font-size="8">0.17%</text>
    <text x="77" y="42" class="bar-label" fill="#34D399" text-anchor="middle" font-size="8">99.83%</text>
  </g>

  <!-- Divider -->
  <line x1="250" y1="50" x2="250" y2="210" stroke="#1F2937" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- Chart 2: After SMOTE -->
  <g transform="translate(250, 10)">
    <!-- Base Axis -->
    <line x1="40" y1="190" x2="200" y2="190" class="axis" />
    <line x1="40" y1="50" x2="40" y2="190" class="axis" />

    <!-- Legit Bar -->
    <rect x="60" y="190" width="35" height="0" rx="4" class="bar-after-legit" />
    <!-- Fraud Bar (Oversampled to 1:10) -->
    <rect x="125" y="190" width="35" height="0" rx="4" class="bar-after-fraud" />

    <!-- Labels -->
    <text x="77" y="206" class="label" text-anchor="middle">Legit</text>
    <text x="142" y="206" class="label" text-anchor="middle">Fraud</text>
    <text x="120" y="228" class="label" text-anchor="middle" font-size="10" font-weight="bold">After SMOTE (1:10 Ratio)</text>

    <!-- Synthetic Text marker -->
    <text x="142" y="140" class="bar-label" fill="#F87171" text-anchor="middle" font-size="8">10.0%</text>
    <text x="77" y="42" class="bar-label" fill="#34D399" text-anchor="middle" font-size="8">90.0%</text>
  </g>
</svg>
